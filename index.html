<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Miko Pet</title>

<style>
body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#container{
    position:fixed;
    bottom:20px;
    right:20px;
    width:280px;
}

#pet{
    font-size:120px;
    animation:bounce 2s infinite;
    text-align:center;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.panel{
    background:rgba(0,0,0,.7);
    color:white;
    padding:10px;
    border-radius:12px;
}

.bar{
    width:100%;
    height:12px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:4px;
}

.fill{
    height:100%;
    transition:0.5s;
}

#xpFill{
    background:#4caf50;
    width:0%;
}

#hungerFill{
    background:#ff9800;
    width:100%;
}

#event{
    margin-top:10px;
    font-size:18px;
    color:yellow;
    min-height:24px;
}
</style>
</head>

<body>

<div id="container">

<div id="pet">🐱</div>

<div class="panel">

<div><b>Miko</b></div>

<div>Level: <span id="level">1</span></div>

<div>XP</div>
<div class="bar">
<div id="xpFill" class="fill"></div>
</div>

<div>Hunger</div>
<div class="bar">
<div id="hungerFill" class="fill"></div>
</div>

<div id="event"></div>

</div>

</div>

<script>

let xp=0;
let level=1;
let hunger=100;

function updateUI(){

let xpNeed=level*100;

document.getElementById("level").innerText=level;

document.getElementById("xpFill").style.width=
(xp/xpNeed*100)+"%";

document.getElementById("hungerFill").style.width=
hunger+"%";
}

function showEvent(msg){

document.getElementById("event").innerText=msg;

setTimeout(()=>{
document.getElementById("event").innerText="";
},5000);
}

function addXP(amount){

xp+=amount;

let xpNeed=level*100;

if(xp>=xpNeed){
xp=0;
level++;

showEvent("🎉 LEVEL UP!");
}

updateUI();
}

function feed(amount){

hunger=Math.min(100,hunger+amount);

showEvent("🍖 Pet Fed");

updateUI();
}

setInterval(()=>{
hunger=Math.max(0,hunger-1);
updateUI();
},10000);

updateUI();

window.petAPI={
rose:function(){
addXP(10);
feed(5);
showEvent("🌹 Rose Received");
},
follow:function(){
addXP(20);
showEvent("❤️ New Follower");
},
galaxy:function(){
addXP(100);
feed(50);
showEvent("🚀 Galaxy Gift");
}
};

</script>

</body>
</html>
