<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
    margin:0;
    overflow:hidden;
    background:transparent;
}

#pet{
    position:absolute;
    bottom:50px;
    left:100px;

    width:128px;
    height:128px;

    image-rendering:pixelated;
}

</style>

</head>

<body>

<img id="pet" src="cat_idle.gif">

<script>

const pet=document.getElementById("pet");

let x=100;
let direction=1;

const SCREEN=1200;

function walk(){

    pet.src="cat_walk.gif";

    let distance=Math.random()*300+100;

    let moved=0;

    let interval=setInterval(()=>{

        x+=direction*2;

        pet.style.left=x+"px";

        moved+=2;

        if(moved>=distance){

            clearInterval(interval);

            idle();
        }

    },20);
}

function idle(){

    pet.src="cat_idle.gif";

    setTimeout(()=>{

        let action=Math.random();

        if(action<0.3){
            sleep();
        }else{

            direction=Math.random()>0.5 ? 1 : -1;

            pet.style.transform=
            direction===-1 ? "scaleX(-1)" : "scaleX(1)";

            walk();
        }

    },3000);
}

function sleep(){

    pet.src="cat_sleep.gif";

    setTimeout(()=>{

        direction=Math.random()>0.5 ? 1 : -1;

        walk();

    },5000);
}

idle();

</script>

</body>
</html>
